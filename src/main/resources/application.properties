# =============================================================
# Quantity Measurement Application - Configuration
# =============================================================

# Application name and active profile
spring.application.name=quantity-measurement-app
spring.profiles.active=prod

# =============================================================
# DATABASE CONFIG (LOCAL - SAFE FOR NOW)
# =============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/quantityapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abcd

spring.jpa.show-sql=true  

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# MySQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================================
# CONNECTION POOL (HikariCP)
# =============================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=QuantityMeasurementPool

# =============================================================
# LOGGING
# =============================================================
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n

# =============================================================
# SWAGGER
# =============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# =============================================================
# GOOGLE OAUTH (FROM ENV)
# =============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

# =============================================================
# ACTUATOR
# =============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

info.app.name=Quantity Measurement App
info.app.version=17.0
info.app.description=Spring Boot REST API for quantity measurement operations

# =============================================================
# SERVER
# =============================================================
server.port=8081