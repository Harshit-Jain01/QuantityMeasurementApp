# ─────────────────────────────────────────────────────────────────────────────
# Quantity Measurement App — Application Configuration
# UC16 - JDBC Database Integration
# ─────────────────────────────────────────────────────────────────────────────

# ── Application Settings ──────────────────────────────────────────────────────
app.name=Quantity Measurement App
app.version=1.0
app.environment=development

# ── Repository Type ───────────────────────────────────────────────────────────
# Options: "database" or "cache"
# Switch between H2 database and in-memory cache repository
app.repository.type=database

# ── H2 Database Configuration (Active) ───────────────────────────────────────
db.driver=org.h2.Driver
db.url=jdbc:h2:./data/quantity_measurement;AUTO_SERVER=TRUE
db.username=Harshit
db.password=1234

# ── Connection Pool Settings ──────────────────────────────────────────────────
db.pool.initialSize=5
db.pool.maxSize=10
db.pool.minIdle=2
db.pool.maxIdle=5
db.pool.connectionTimeout=30000
db.pool.idleTimeout=600000

# ── MySQL Configuration (commented — for future use) ─────────────────────────
# db.driver=com.mysql.cj.jdbc.Driver
# db.url=jdbc:mysql://localhost:3306/quantity_measurement?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=your_password

# ── PostgreSQL Configuration (commented — for future use) ────────────────────
# db.driver=org.postgresql.Driver
# db.url=jdbc:postgresql://localhost:5432/quantity_measurement
# db.username=postgres
# db.password=your_password

# ── Logging Settings ──────────────────────────────────────────────────────────
logging.level=INFO
logging.file=logs/quantity-measurement.log